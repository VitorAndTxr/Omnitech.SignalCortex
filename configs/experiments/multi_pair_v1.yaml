# Experiment: Multi-pair training with all pairs except ETHUSDT
# Changes from default: pair_names (multi), pos_weight 4.0, cosine_warmup scheduler, lr 0.003

data:
  pair_names:
    - BTCUSDT
    - BNBUSDT
    - XRPUSDT
    - ADAUSDT
    - SOLUSDT
    - DOGEUSDT
    - DOTUSDT
    - AVAXUSDT
    - LINKUSDT

training:
  learning_rate: 0.001
  batch_size: 512
  scheduler: one_cycle
  warmup_epochs: 0
  auto_class_weights: false
  pos_weight: 7.0
  epochs: 30
  early_stopping_patience: 15

export:
  output_dir: outputs/multi_pair_v1/
